date-format: long
institute: "Duke University <br> STA 199 Summer 2026: Session I"
author: "Katie Solarz"
format:
  revealjs:
    footer: "[🔗 sta199-su26.github.io](https://sta199-su26.github.io/)"
    theme: slides.scss
    transition: fade
    slide-number: true
    logo: "img/pfp.png" 
    toc: false
    webr:
      cell-options:
        autorun: false
  html:
    code-link: true
    webr:
      cell-options:
        autorun: true
engine: knitr
highlight-style: a11y-light
execute:
  echo: true
  warning: true
knitr:
  opts_chunk: 
    R.options:
      width: 70